name: Tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-test"
          cache-on-failure: true

      - name: Run tests
        run: cargo test --no-fail-fast

  offline:
    name: Offline tests (mock — no API keys)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-offline"
          cache-on-failure: true

      # Dependency-light build with the mock client and no networked providers.
      - name: Schema-only build (derive + mock)
        run: cargo build --no-default-features --features "derive,mock"

      - name: Mock unit tests (schema-only)
        run: cargo test --no-default-features --features "derive,mock" --lib

      - name: Mock integration tests (schema-only core)
        run: cargo test --no-default-features --features "derive,mock" --test mock_client_tests

      # Exercises the streaming + tool-loop mock paths (offline; no keys needed).
      - name: Mock integration tests (streaming + tools)
        run: cargo test --features "mock,streaming,tools" --test mock_client_tests
